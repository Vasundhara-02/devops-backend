name: Node CI Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cipipeline-app:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/cipipeline-app:latest ${{ secrets.DOCKER_USERNAME }}/cipipeline-app:${{ github.sha }}
      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cipipeline-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cipipeline-app:${{ github.sha }}